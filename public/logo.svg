<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <!-- Icon mark (40x40, left side) -->
  <g transform="translate(0, 10) scale(0.4)">
    <rect width="100" height="100" rx="14" fill="#1648F4"/>
    <!-- 3-block staircase mark -->
    <rect x="10" y="10" width="38" height="38" fill="white"/>
    <rect x="36" y="36" width="28" height="28" fill="white"/>
    <rect x="52" y="52" width="38" height="38" fill="white"/>
    <rect x="16" y="16" width="26" height="26" fill="#1648F4"/>
    <rect x="58" y="58" width="26" height="26" fill="#1648F4"/>
  </g>

  <!-- "School" text -->
  <text
    x="52"
    y="26"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-size="20"
    font-weight="700"
    fill="#1648F4"
    letter-spacing="-0.5"
  >School</text>

  <!-- "Artisan" text -->
  <text
    x="52"
    y="48"
    font-family="'Segoe UI', 'Inter', Arial, sans-serif"
    font-size="16"
    font-weight="400"
    fill="#444444"
    letter-spacing="2"
  >ARTISAN</text>
</svg>
