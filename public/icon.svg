<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Deep royal blue — matches reference image tone -->
  <rect width="100" height="100" rx="14" fill="#1648F4"/>

  <!--
    3-block staircase pattern — inspired by reference image.
    White blocks descend diagonally: top-left → bottom-right,
    creating an angular / architectural "step" mark for School Artisan.
  -->

  <!-- Block 1: top-left large square -->
  <rect x="10" y="10" width="38" height="38" fill="white"/>

  <!-- Block 2: middle bridge block -->
  <rect x="36" y="36" width="28" height="28" fill="white"/>

  <!-- Block 3: bottom-right large square -->
  <rect x="52" y="52" width="38" height="38" fill="white"/>

  <!-- Negative-space inner cutouts to create "notched" angular feel -->
  <rect x="16" y="16" width="26" height="26" fill="#1648F4"/>
  <rect x="58" y="58" width="26" height="26" fill="#1648F4"/>
</svg>
