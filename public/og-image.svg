<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2558F5"/>
      <stop offset="100%" stop-color="#1648F4"/>
    </linearGradient>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.2" fill="#CBD5E1" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Blue accent bar top -->
  <rect width="1200" height="5" fill="#1648F4"/>

  <!-- ===== LEFT SIDE: Branding ===== -->

  <!-- Icon mark -->
  <g transform="translate(70, 100) scale(1.1)">
    <rect width="100" height="100" rx="14" fill="url(#blueGrad)"/>
    <rect x="10" y="10" width="38" height="38" fill="white"/>
    <rect x="36" y="36" width="28" height="28" fill="white"/>
    <rect x="52" y="52" width="38" height="38" fill="white"/>
    <rect x="16" y="16" width="26" height="26" fill="#1648F4"/>
    <rect x="58" y="58" width="26" height="26" fill="#1648F4"/>
  </g>

  <!-- "School Artisan" -->
  <text x="195" y="155" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="48" font-weight="700" fill="#1648F4" letter-spacing="-1">School Artisan</text>

  <!-- Tagline -->
  <text x="195" y="195" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="21" font-weight="400" fill="#64748B" letter-spacing="0.3">Smart School Management System</text>

  <!-- Divider line -->
  <rect x="70" y="230" width="500" height="1.5" rx="1" fill="#E2E8F0"/>

  <!-- Description -->
  <text x="70" y="268" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="18" fill="#475569" letter-spacing="0.2">All-in-one platform to digitize your school —</text>
  <text x="70" y="295" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="18" fill="#475569" letter-spacing="0.2">manage everything from one simple dashboard.</text>

  <!-- Feature pills row 1 -->
  <g transform="translate(70, 325)">
    <rect x="0" y="0" width="148" height="36" rx="18" fill="#DBEAFE"/>
    <text x="74" y="24" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="14" fill="#1648F4" text-anchor="middle" font-weight="600">Attendance</text>

    <rect x="160" y="0" width="165" height="36" rx="18" fill="#DBEAFE"/>
    <text x="242" y="24" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="14" fill="#1648F4" text-anchor="middle" font-weight="600">Fee Management</text>

    <rect x="337" y="0" width="165" height="36" rx="18" fill="#DBEAFE"/>
    <text x="420" y="24" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="14" fill="#1648F4" text-anchor="middle" font-weight="600">Exams &amp; Results</text>
  </g>

  <!-- Feature pills row 2 -->
  <g transform="translate(70, 373)">
    <rect x="0" y="0" width="152" height="36" rx="18" fill="#DBEAFE"/>
    <text x="76" y="24" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="14" fill="#1648F4" text-anchor="middle" font-weight="600">Parent Portal</text>

    <rect x="164" y="0" width="170" height="36" rx="18" fill="#DBEAFE"/>
    <text x="249" y="24" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="14" fill="#1648F4" text-anchor="middle" font-weight="600">School Website</text>

    <rect x="346" y="0" width="155" height="36" rx="18" fill="#DBEAFE"/>
    <text x="424" y="24" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="14" fill="#1648F4" text-anchor="middle" font-weight="600">Report Cards</text>
  </g>

  <!-- Website URL -->
  <text x="70" y="460" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="16" fill="#94A3B8" font-weight="500">schoolartisan.com</text>

  <!-- ===== RIGHT SIDE: Mini Dashboard Preview ===== -->

  <!-- Dashboard card shadow -->
  <rect x="640" y="75" width="500" height="480" rx="20" fill="#000" opacity="0.06"/>

  <!-- Dashboard card -->
  <rect x="635" y="70" width="500" height="480" rx="20" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Dashboard header bar -->
  <rect x="635" y="70" width="500" height="55" rx="20" fill="#1648F4"/>
  <rect x="635" y="100" width="500" height="25" fill="#1648F4"/>
  <text x="660" y="104" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="16" fill="white" font-weight="600">Dashboard</text>
  <!-- Window dots -->
  <circle cx="1095" cy="97" r="6" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="1112" cy="97" r="6" fill="#FFFFFF" opacity="0.3"/>

  <!-- Stat cards row -->
  <g transform="translate(655, 140)">
    <!-- Students -->
    <rect x="0" y="0" width="145" height="70" rx="10" fill="#EEF2FF"/>
    <text x="12" y="25" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#64748B" font-weight="500">Total Students</text>
    <text x="12" y="52" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="24" fill="#1648F4" font-weight="700">1,245</text>

    <!-- Teachers -->
    <rect x="155" y="0" width="145" height="70" rx="10" fill="#F0FDF4"/>
    <text x="167" y="25" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#64748B" font-weight="500">Teachers</text>
    <text x="167" y="52" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="24" fill="#16A34A" font-weight="700">68</text>

    <!-- Fee Collection -->
    <rect x="310" y="0" width="145" height="70" rx="10" fill="#FFF7ED"/>
    <text x="322" y="25" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#64748B" font-weight="500">Fee Collected</text>
    <text x="322" y="52" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="24" fill="#EA580C" font-weight="700">89%</text>
  </g>

  <!-- Attendance chart area -->
  <g transform="translate(655, 228)">
    <rect x="0" y="0" width="300" height="145" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="14" y="24" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="12" fill="#334155" font-weight="600">Weekly Attendance</text>

    <!-- Bar chart -->
    <rect x="25" y="105" width="30" height="25" rx="3" fill="#DBEAFE"/>
    <rect x="63" y="75" width="30" height="55" rx="3" fill="#DBEAFE"/>
    <rect x="101" y="55" width="30" height="75" rx="3" fill="#93C5FD"/>
    <rect x="139" y="45" width="30" height="85" rx="3" fill="#93C5FD"/>
    <rect x="177" y="60" width="30" height="70" rx="3" fill="#93C5FD"/>
    <rect x="215" y="40" width="30" height="90" rx="3" fill="#1648F4"/>
    <rect x="253" y="80" width="30" height="50" rx="3" fill="#DBEAFE"/>

    <!-- Day labels -->
    <text x="32" y="140" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">M</text>
    <text x="70" y="140" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">T</text>
    <text x="108" y="140" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">W</text>
    <text x="146" y="140" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">T</text>
    <text x="184" y="140" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">F</text>
    <text x="222" y="140" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">S</text>
    <text x="260" y="140" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">S</text>
  </g>

  <!-- Recent activity panel -->
  <g transform="translate(965, 228)">
    <rect x="0" y="0" width="155" height="145" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="12" y="24" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="12" fill="#334155" font-weight="600">Quick Actions</text>

    <!-- Action items -->
    <rect x="10" y="40" width="135" height="28" rx="6" fill="#EEF2FF"/>
    <text x="22" y="59" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="10" fill="#1648F4" font-weight="500">Mark Attendance</text>

    <rect x="10" y="74" width="135" height="28" rx="6" fill="#F0FDF4"/>
    <text x="22" y="93" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="10" fill="#16A34A" font-weight="500">Collect Fee</text>

    <rect x="10" y="108" width="135" height="28" rx="6" fill="#FFF7ED"/>
    <text x="22" y="127" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="10" fill="#EA580C" font-weight="500">Generate Report</text>
  </g>

  <!-- Student list table -->
  <g transform="translate(655, 388)">
    <rect x="0" y="0" width="460" height="145" rx="10" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="14" y="24" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="12" fill="#334155" font-weight="600">Recent Students</text>

    <!-- Table header -->
    <rect x="10" y="35" width="440" height="24" rx="4" fill="#EEF2FF"/>
    <text x="22" y="52" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="10" fill="#64748B" font-weight="600">Name</text>
    <text x="160" y="52" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="10" fill="#64748B" font-weight="600">Class</text>
    <text x="260" y="52" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="10" fill="#64748B" font-weight="600">Fee Status</text>
    <text x="370" y="52" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="10" fill="#64748B" font-weight="600">Attendance</text>

    <!-- Row 1 -->
    <text x="22" y="78" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#334155">Ahmed Ali</text>
    <text x="160" y="78" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#64748B">Grade 8-A</text>
    <rect x="260" y="66" width="50" height="18" rx="9" fill="#DCFCE7"/>
    <text x="272" y="79" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="9" fill="#16A34A" font-weight="600">Paid</text>
    <text x="370" y="78" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#334155">95%</text>

    <!-- Row 2 -->
    <text x="22" y="102" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#334155">Fatima Khan</text>
    <text x="160" y="102" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#64748B">Grade 6-B</text>
    <rect x="260" y="90" width="64" height="18" rx="9" fill="#FEF3C7"/>
    <text x="272" y="103" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="9" fill="#D97706" font-weight="600">Pending</text>
    <text x="370" y="102" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#334155">88%</text>

    <!-- Row 3 -->
    <text x="22" y="126" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#334155">Zain Raza</text>
    <text x="160" y="126" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#64748B">Grade 10-A</text>
    <rect x="260" y="114" width="50" height="18" rx="9" fill="#DCFCE7"/>
    <text x="272" y="127" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="9" fill="#16A34A" font-weight="600">Paid</text>
    <text x="370" y="126" font-family="'Segoe UI', 'Inter', Arial, sans-serif" font-size="11" fill="#334155">92%</text>
  </g>

  <!-- Blue accent bar bottom -->
  <rect y="625" width="1200" height="5" fill="#1648F4"/>
</svg>
